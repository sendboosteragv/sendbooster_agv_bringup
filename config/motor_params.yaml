# Motor Driver Parameters for Sendbooster AGV
# Modify these values according to your robot configuration

motor_driver_node:
  ros__parameters:
    # Serial communication
    serial_port: "/dev/ttyUSB0"
    baudrate: 57600

    # Motor driver IDs (MDROBOT protocol)
    mdui_id: 184      # PC ID
    mdt_id: 183       # Motor driver ID
    motor_id: 1       # Motor channel ID

    # Motor parameters
    gear_ratio: 15    # Motor gear ratio
    poles: 10         # Motor pole count

    # Robot geometry (IMPORTANT: Set these values for your robot!)
    wheel_radius: 0.05        # Wheel radius in meters
    wheel_separation: 0.3     # Distance between wheels in meters

    # Encoder parameters
    encoder_resolution: 6535  # Pulses per revolution

    # Control parameters
    max_rpm: 100              # Maximum RPM limit
    control_rate: 50.0        # Control loop rate (Hz)
    publish_rate: 50.0        # Odometry publish rate (Hz)
    cmd_vel_timeout: 0.5      # Stop motors if no cmd_vel for this duration (seconds)

    # Frame IDs
    odom_frame_id: "odom"
    base_frame_id: "base_link"
