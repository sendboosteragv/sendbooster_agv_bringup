    max_accel:
    - 1.5
    - 0.0
    - 1.5
    max_decel:
    - -1.5
    - 0.0
    - -1.5
    max_velocity:
    - 0.5
    - 0.0
    - 2.0
    min_velocity:
    - -0.1
    - 0.0
    - -2.0
    odom_duration: 0.1
    odom_topic: /odometry/filtered
    scale_velocities: false
    smoothing_frequency: 5.0
    use_sim_time: false
    velocity_timeout: 1.0
