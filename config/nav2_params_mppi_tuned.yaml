bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false
bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false
controller_server:
  ros__parameters:
    FollowPath:
      ConstraintCritic:
        cost_power: 1
        cost_weight: 4.0
        enabled: true
      GoalAngleCritic:
        cost_power: 1
        cost_weight: 3.0
        enabled: true
        threshold_to_consider: 0.5
      GoalCritic:
        cost_power: 1
        cost_weight: 5.0
        enabled: true
        threshold_to_consider: 1.4
      ObstaclesCritic:
        collision_cost: 10000.0
        collision_margin_distance: 0.25
        consider_footprint: true
        cost_weight: 3.0
        critical_weight: 40.0
        enabled: true
        near_goal_distance: 0.5
        repulsion_weight: 1.5
      PathAlignCritic:
        cost_power: 1
        cost_weight: 14.0
        enabled: true
        max_path_occupancy_ratio: 0.05
        offset_from_furthest: 20
        threshold_to_consider: 0.5
        trajectory_point_step: 3
      PathAngleCritic:
        cost_power: 1
        cost_weight: 2.0
        enabled: true
        max_angle_to_furthest: 1.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
      PathFollowCritic:
        cost_power: 1
        cost_weight: 5.0
        enabled: true
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PreferForwardCritic:
        cost_power: 1
        cost_weight: 5.0
        enabled: true
        threshold_to_consider: 0.5
      batch_size: 500
      critics:
      - ConstraintCritic
      - ObstaclesCritic
      - GoalCritic
      - GoalAngleCritic
      - PathAlignCritic
      - PathFollowCritic
      - PathAngleCritic
      - PreferForwardCritic
      iteration_count: 1
      model_dt: 0.05
      motion_model: DiffDrive
      plugin: nav2_mppi_controller::MPPIController
      prune_distance: 1.7
      temperature: 0.3
      time_steps: 32
      transform_tolerance: 0.1
      vx_max: 0.5
      vx_min: -0.1
      vx_std: 0.2
      vy_max: 0.0
      vy_std: 0.0
      wz_max: 1.0
      wz_std: 0.4
    controller_frequency: 20.0
    controller_plugins:
    - FollowPath
    failure_tolerance: 0.3
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    goal_checker_plugins:
    - general_goal_checker
    min_theta_velocity_threshold: 0.001
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    progress_checker:
      movement_time_allowance: 30.0
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05
    progress_checker_plugin: progress_checker
    use_sim_time: false
costmap_filter_info_server:
  ros__parameters:
    filter_info_topic: /costmap_filter_info
    mask_topic: /keepout_filter_mask
    type: 0
    use_sim_time: false
filter_mask_server:
  ros__parameters:
    frame_id: map
    topic_name: /keepout_filter_mask
    use_sim_time: false
    yaml_filename: ''
global_costmap:
  global_costmap:
    ros__parameters:
      always_send_full_costmap: false
      footprint: '[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]'
      global_frame: map
      inflation_layer:
        cost_scaling_factor: 2.0
        inflation_radius: 0.7
        plugin: nav2_costmap_2d::InflationLayer
      keepout_filter:
        enabled: true
        filter_info_topic: /costmap_filter_info
        plugin: nav2_costmap_2d::KeepoutFilter
      plugins:
      - static_layer
      - keepout_filter
      - inflation_layer
      publish_frequency: 0.5
      resolution: 0.1
      robot_base_frame: base_footprint
      static_layer:
        map_subscribe_transient_local: true
        plugin: nav2_costmap_2d::StaticLayer
      track_unknown_space: true
      transform_tolerance: 0.5
      update_frequency: 0.5
      use_sim_time: false
lifecycle_manager_localization:
  ros__parameters:
    attempt_respawn_reconnection: true
    autostart: true
    bond_respawn_max_duration: 30.0
    bond_timeout: 30.0
    node_names:
    - map_server
    - amcl
    use_sim_time: false
lifecycle_manager_navigation:
  ros__parameters:
    attempt_respawn_reconnection: true
    autostart: true
    bond_respawn_max_duration: 30.0
    bond_timeout: 30.0
    node_names:
    - controller_server
    - smoother_server
    - planner_server
    - behavior_server
    - bt_navigator
    - waypoint_follower
    - velocity_smoother
    use_sim_time: false
local_costmap:
  local_costmap:
    ros__parameters:
      always_send_full_costmap: false
      footprint: '[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]'
      global_frame: odom
      height: 4
      inflation_layer:
        cost_scaling_factor: 2.0
        inflation_radius: 0.7
        plugin: nav2_costmap_2d::InflationLayer
      keepout_filter:
        enabled: true
        filter_info_topic: /costmap_filter_info
        plugin: nav2_costmap_2d::KeepoutFilter
      obstacle_layer:
        combination_method: 0
        enabled: true
        front_scan:
          clearing: true
          data_type: LaserScan
          inf_is_valid: true
          marking: true
          max_obstacle_height: 2.0
          observation_persistence: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.15
          raytrace_max_range: 6.0
          raytrace_min_range: 0.15
          topic: /scan_raw_front
        observation_sources: front_scan
        plugin: nav2_costmap_2d::ObstacleLayer
      plugins:
      - obstacle_layer
      - keepout_filter
      - inflation_layer
      publish_frequency: 1.0
      resolution: 0.05
      robot_base_frame: base_footprint
      rolling_window: true
      transform_tolerance: 0.5
      update_frequency: 5.0
      use_sim_time: false
      width: 4
map_saver:
  ros__parameters:
    free_thresh_default: 0.25
    map_subscribe_transient_local: true
    occupied_thresh_default: 0.65
    save_map_timeout: 5.0
    use_sim_time: false
map_server:
  ros__parameters:
    use_sim_time: false
