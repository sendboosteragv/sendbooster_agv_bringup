# Nav2 Parameters — MPPI Auto-Tuned for Jetson Orin Nano
# Tuned on 2026-03-27 17:24:13
# CPU target: 60.0% (Jetson Orin Nano, 3 simulated cores)
# Best params: {"batch_size": 500, "time_steps": 32, "iteration_count": 1, "max_particles": 500, "max_beams": 30}
#
amcl:
  ros__parameters:
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.05
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    initial_pose:
      x: 0.0
      y: -1.0
      yaw: -1.5708
      z: 0.0
    lambda_short: 0.1
    laser_likelihood_max_dist: 5.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    laser_model_type: likelihood_field
    max_beams: 30
    max_particles: 500
    min_particles: 200
    odom_frame_id: odom
    pf_err: 0.01
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: nav2_amcl::DifferentialMotionModel
    save_pose_rate: 0.5
    scan_topic: scan_raw_front
    set_initial_pose: true
    sigma_hit: 0.1
    tf_broadcast: true
    transform_tolerance: 0.5
    update_min_a: 0.05
    update_min_d: 0.05
    use_sim_time: false
    z_hit: 0.85
    z_max: 0.05
    z_rand: 0.05
    z_short: 0.05
behavior_server:
  ros__parameters:
    backup:
      plugin: nav2_behaviors/BackUp
    behavior_plugins:
    - spin
    - backup
    - wait
    costmap_topic: local_costmap/costmap_raw
